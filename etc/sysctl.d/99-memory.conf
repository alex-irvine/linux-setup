# Reduce the kernel's eagerness to swap anonymous pages.
#
# Default vm.swappiness=60 contributed to a swap-thrash freeze (2026-06-01):
# host Roslyn LSP loading the full solution on top of a running devcontainer
# (sqlservr peaked ~11.6G) exhausted 30G RAM, the kernel paged the working
# set out to swap, and with no userspace OOM killer present it thrashed
# indefinitely -- only a hard reboot recovered.
#
# Lower value keeps the active working set resident longer and delays the
# onset of thrash. earlyoom (etc/default/earlyoom) is the real safety net.
vm.swappiness = 10
