# ARP hygiene for a multi-homed host (wired + wifi on the SAME subnet).
#
# The office network puts wired and wireless on one flat /22, so the laptop
# holds two IPs on the same L2 segment when docked. With Linux's default ARP
# settings (arp_ignore=0, arp_announce=0) each interface answers ARP requests
# for the *other* interface's IP. NetworkManager's address-conflict detection
# (ACD) then sees its own probe answered by a different MAC and declares a
# duplicate-IP conflict — e.g. "conflict for 10.1.246.137 (wired) with <wifi
# MAC>" — and penalises the wired default route, so a docked machine flaps back
# to wifi even though wired works. (This was the real cause of "docked but no
# internet" / "won't switch to wired", NOT the wifi radio or route metrics.)
#
# arp_ignore=1: only answer ARP for a target IP that is configured on the
#   interface the request arrived on — stops the cross-interface answers.
# arp_announce=2: always source ARP announcements from the best local address
#   for the target subnet — keeps the neighbour tables consistent.
#
# With these, ACD no longer self-triggers, so the route metrics in
# NetworkManager/conf.d/10-prefer-wired.conf (wired 100 < wifi 600) make wired
# win deterministically when docked. ACD stays enabled, so a genuine external
# duplicate IP is still detected.
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.default.arp_announce = 2
