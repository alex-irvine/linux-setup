# Prefer wired over wifi by route metric — without ever touching the wifi radio.
#
# Lower route-metric = preferred default route. These values match
# NetworkManager's built-in defaults (ethernet 100, wifi 600) but pin them
# explicitly so the intent is documented and can't silently regress: whenever a
# wired link is up (docked), its default route wins; the moment it's gone
# (undocked), wifi's route takes over automatically. Both interfaces stay up the
# whole time, so the switch is instant and a dead or flapping dock ethernet can
# never strand the machine offline.
#
# Replaces the old dispatcher.d/10-prefer-wired script, which switched the wifi
# *radio* off on dock. That could leave no connectivity when wired had a default
# route but no real internet, and its nmcli-from-dispatcher calls caused
# radio on/off event storms that occasionally left wifi stuck off.

[connection-prefer-wired-ethernet]
match-device=type:ethernet
ipv4.route-metric=100
ipv6.route-metric=100

[connection-prefer-wired-wifi]
match-device=type:wifi
ipv4.route-metric=600
ipv6.route-metric=600
